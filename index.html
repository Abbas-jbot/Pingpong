<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Website by abbas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <nav>
      <h1 class="logo">The ping pong game </h1>
      <ul class="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#game">Game</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section id="home" class="hero">
    <h2>Welcome to My Website</h2>
    <p>A modern responsive website with a built-in Ping Pong game.</p>
    <button id="themeBtn">Toggle Theme</button>
  </section>

  <section id="about" class="content">
    <h2>About</h2>
    <p>Thank you for visiting my website.</p>
  </section>

  <section id="game" class="content">
    <h2>THE PING PONG GAME</h2>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <p>Control the left paddle using W and S keys.</p>
  </section>

  <section id="contact" class="content">
    <h2>Contact</h2>
    <form>
      <input type="text" placeholder="Your Name" required />
      <input type="email" placeholder="Your Email" required />
      <textarea placeholder="Your Message"></textarea>
      <button type="submit">Send</button>
    </form>
  </section>

  <script src="script.js"></script>
</body>
</html>
